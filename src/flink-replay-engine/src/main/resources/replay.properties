# Replay Engine Configuration

# Timestream Configuration
timestream.region=eu-central-1
timestream.database=kdaflink
timestream.table=kinesisdata1

# Flink Configuration
flink.parallelism=1
flink.checkpoint.interval=60000
flink.state.backend.dir=./state

# Replay Configuration
replay.default.speed.factor=1.0
replay.default.zscore.threshold=3.0
replay.default.dirty.data.isolation=true

# RCF Model Parameters
rcf.shingle.size=1
rcf.shingle.cyclic=false
rcf.number.of.trees=50
rcf.sample.size=8192
rcf.lambda=0.00001220703125
rcf.random.seed=42

# Server Configuration
server.port=8080
server.report.dir=./reports
