status = error
dest = err
name = PropertiesConfig

property.filename = target/flink.log

filter.threshold.type = ThresholdFilter
filter.threshold.level = debug

appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n
appender.console.filter.threshold.type = ThresholdFilter
appender.console.filter.threshold.level = info

appender.rolling.type = RollingFile
appender.rolling.name = RollingFile
appender.rolling.fileName = logs/replay-engine.log
appender.rolling.filePattern = logs/replay-engine-%d{yyyy-MM-dd}-%i.log
appender.rolling.layout.type = PatternLayout
appender.rolling.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n
appender.rolling.policies.type = Policies
appender.rolling.policies.time.type = TimeBasedTriggeringPolicy
appender.rolling.policies.time.interval = 1
appender.rolling.policies.time.modulate = true
appender.rolling.policies.size.type = SizeBasedTriggeringPolicy
appender.rolling.policies.size.size=100MB
appender.rolling.strategy.type = DefaultRolloverStrategy
appender.rolling.strategy.max = 10

rootLogger.level = info
rootLogger.appenderRef.console.ref = STDOUT
rootLogger.appenderRef.rolling.ref = RollingFile

logger.replay.name = com.amazonaws.services.replay
logger.replay.level = debug
logger.replay.additivity = false
logger.replay.appenderRef.console.ref = STDOUT
logger.replay.appenderRef.rolling.ref = RollingFile

logger.flink.name = org.apache.flink
logger.flink.level = warn
logger.flink.additivity = false
logger.flink.appenderRef.console.ref = STDOUT
logger.flink.appenderRef.rolling.ref = RollingFile
